name: Check for Updates

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new libyal releases
        id: check
        run: |
          LIBS="libcerror libcthreads libcdata libclocale libcnotify libuna libcfile libcpath libbfio libfcache libfguid"
          CHANGES=""
          for lib in $LIBS; do
            LATEST=$(curl -sf "https://api.github.com/repos/libyal/$lib/releases/latest" | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p')
            # Extract version variable name (uppercase)
            VAR=$(echo "$lib" | tr '[:lower:]' '[:upper:]' | tr '-' '_')_VERSION
            CURRENT=$(sed -n "s/^${VAR} = //p" .copr/Makefile)
            echo "$lib: latest=$LATEST current=$CURRENT"
            if [ "$LATEST" != "$CURRENT" ] && [ -n "$LATEST" ]; then
              CHANGES="$CHANGES $lib:$VAR:$LATEST"
            fi
          done
          if [ -n "$CHANGES" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "updates=$CHANGES" >> "$GITHUB_OUTPUT"
          fi

      - name: Update and push
        if: steps.check.outputs.changes == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          LATEST_DATE=0
          for update in ${{ steps.check.outputs.updates }}; do
            LIB=$(echo "$update" | cut -d: -f1)
            VAR=$(echo "$update" | cut -d: -f2)
            VER=$(echo "$update" | cut -d: -f3)
            echo "Updating $LIB: $VAR = $VER"
            sed -i "s/^${VAR} = .*/${VAR} = ${VER}/" .copr/Makefile
            if [ "$VER" -gt "$LATEST_DATE" ] 2>/dev/null; then
              LATEST_DATE=$VER
            fi
          done
          if [ "$LATEST_DATE" -gt 0 ] 2>/dev/null; then
            sed -i "s/^BUNDLE_VERSION = .*/BUNDLE_VERSION = ${LATEST_DATE}/" .copr/Makefile
          fi
          git add .copr/Makefile
          git commit -m "Auto-update: libyal library versions"
          git push

      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          time_elapsed: 45
